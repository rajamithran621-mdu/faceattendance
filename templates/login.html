<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Sign In — FaceAttend</title>
  <meta name="description" content="Sign in to FaceAttend - Smart Face Recognition Attendance System">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="aurora-bg">
    <div class="aurora-layer aurora-1"></div>
    <div class="aurora-layer aurora-2"></div>
    <div class="aurora-layer aurora-3"></div>
    <div class="aurora-layer aurora-4"></div>
  </div>
  <canvas class="particles-canvas" id="particlesCanvas"></canvas>

  <div class="auth-wrap">
    <div class="auth-card glass-card">
      <div class="auth-logo">🎓</div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-sub">Sign in to your attendance account</p>

      {% if error %}
      <div class="alert alert-error">✕ {{ error }}</div>
      {% endif %}

      <div class="role-tabs">
        <button class="role-tab active" data-role="student">🎓 Student</button>
        <button class="role-tab" data-role="staff">👨‍🏫 Staff</button>
      </div>

      <form method="POST" action="/login" id="loginForm">
        <input type="hidden" id="roleInput" name="role" value="student">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:0.5rem">🔐 Sign In</button>
      </form>

      <div class="auth-link">Don't have an account? <a href="/register">Register here</a></div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
