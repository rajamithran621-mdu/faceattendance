<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register — FaceAttend</title>
  <meta name="description" content="Create your FaceAttend account - Smart Face Recognition Attendance System">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="aurora-bg">
    <div class="aurora-layer aurora-1"></div>
    <div class="aurora-layer aurora-2"></div>
    <div class="aurora-layer aurora-3"></div>
    <div class="aurora-layer aurora-4"></div>
  </div>
  <canvas class="particles-canvas" id="particlesCanvas"></canvas>

  <div class="auth-wrap">
    <div class="auth-card glass-card">
      <div class="auth-logo">✦</div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-sub">Register to start tracking attendance</p>

      {% if error %}
      <div class="alert alert-error">✕ {{ error }}</div>
      {% endif %}

      <div class="role-tabs">
        <button class="role-tab active" data-role="student">🎓 Student</button>
        <button class="role-tab" data-role="staff">👨‍🏫 Staff</button>
      </div>

      <form method="POST" action="/register">
        <input type="hidden" id="roleInput" name="role" value="student">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" class="form-control" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Create a password" required>
        </div>
        <div id="studentFields">
          <div class="form-group">
            <label for="roll_no">Roll Number</label>
            <input type="text" id="roll_no" name="roll_no" class="form-control" placeholder="e.g. CS2024001" required>
          </div>
        </div>
        <div class="form-group">
          <label for="department">Department</label>
          <select id="department" name="department" class="form-control" required>
            <option value="CSE">Computer Science (CSE)</option>
            <option value="ECE">Electronics (ECE)</option>
            <option value="EEE">Electrical (EEE)</option>
            <option value="MECH">Mechanical (MECH)</option>
            <option value="CIVIL">Civil (CIVIL)</option>
            <option value="IT">Information Technology (IT)</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:0.5rem">✦ Create Account</button>
      </form>

      <div class="auth-link">Already have an account? <a href="/login">Sign in</a></div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
